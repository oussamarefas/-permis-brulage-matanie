Index.html - Carte des permis de brûlage 

<!DOCTYPE html> 
<html lang="fr"> 
 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
 
<title>Carte des permis de brûlage</title> 
 
<link rel="stylesheet" 
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> 
 
<style> 
html, 
body{ 
    margin:0; 
    padding:0; 
    height:100%; 
} 
 
#map{ 
    width:100%; 
    height:100vh; 
} 
 
.titre{ 
    position:absolute; 
    top:10px; 
    left:10px; 
    z-index:1000; 
    background:white; 
    padding:10px; 
    border-radius:5px; 
    font-weight:bold; 
    box-shadow:0 0 5px rgba(0,0,0,0.3); 
} 
 
</style> 
 
</head> 
 
<body> 
 
<div class="titre"> 
Carte des permis de brûlage 
</div> 
 
<div id="map"></div> 
 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
 
<script> 
 
const map = L.map('map').setView([48.85, -67.53], 9); 
 
L.tileLayer( 
'https://tile.openstreetmap.org/{z}/{x}/{y}.png', 
{ 
attribution:'© OpenStreetMap' 
} 
).addTo(map); 
 
fetch('https://permis-brulage.oussama-refas.workers.dev') 
.then(response => response.json()) 
.then(permis => { 
 
console.log(permis); 
 
permis.forEach(p => { 
 
if(!p.latitude || !p.longitude){ 
    return; 
} 
 
let couleur = "green"; 
 
if(p.Data.__DPBstatut == 5){ 
    couleur = "red"; 
} 
 
L.circleMarker( 
[ 
parseFloat(p.latitude), 
parseFloat(p.longitude) 
], 
{ 
radius:8, 
color:couleur, 
fillColor:couleur, 
fillOpacity:0.8 
} 
) 
.addTo(map) 
.bindPopup( 
"<b>Permis #" + p.RecordID + "</b><br>" + 
p.adresseComplete + "<br>" + 
"Expiration : " + p.Data.EndDate 
); 
 
}); 
 
}) 
.catch(error => { 
console.error(error); 
}); 
 
</script> 
 
</body> 
</html>
