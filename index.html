<!DOCTYPE html> 
<html lang="fr"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Portail Prévention Incendie - MRC de La Matanie</title> 
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> 
<style> 
:root{--bleu:#003E6B;--bleu2:#005A93;--vert:#5A9E3A;--jaune:#D7A937;--orange:#ee7c22;--rouge:#C0392B;--gris:#f4f6f8} 
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--gris)} 
.header{background:linear-gradient(135deg,var(--bleu),var(--bleu2));color:#fff;text-align:center;padding:40px} 
.logo{max-height:140px}.stats{display:flex;gap:15px;padding:20px;flex-wrap:wrap} 
.card{background:#fff;border-radius:16px;padding:20px;flex:1;min-width:180px} 
.layout{display:flex;gap:20px;padding:20px}.sidebar{width:320px;background:#fff;border-radius:16px;padding:15px} 
#map{flex:1;height:75vh;border-radius:16px}.permis-item{padding:10px;border-bottom:1px solid #eee;cursor:pointer} 
.layer{padding:8px;margin-bottom:8px;background:#f5f7fa;border-radius:8px} 
</style> 
</head> 
<body> 
<div class="header"> 
<img src="Logo-SPI-Transparent.png" class="logo"> 
<h1>Portail Prévention Incendie</h1> 
<p>MRC de La Matanie</p> 
</div> 
<div class="stats"> 
<div class="card"><h2 id="actifs">0</h2><p>Permis actifs</p></div> 
<div class="card"><h2 id="expire">0</h2><p>Expire bientôt</p></div> 
<div class="card"><h2 id="municipalites">0</h2><p>Municipalités concernées</p></div> 
<div class="card"><h2 id="dangerGlobal">--</h2><p>Danger SOPFEU</p></div> 
</div> 
<div class="layout"> 
<div class="sidebar"> 
<h3>Couches</h3> 
<label><input type="checkbox" id="layerPermis" checked> Permis de brûlage</label><br> 
<label><input type="checkbox" id="layerDanger" checked> Danger incendie SOPFEU</label> 
<h3>Zones SOPFEU</h3><div id="zonesDanger"></div> 
<h3>Permis actifs</h3><div id="listePermis"></div> 
</div> 
<div id="map"></div> 
</div> 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
<script> 
const map=L.map('map').setView([48.85,-67.53],9); 
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map); 
const permisLayer=L.layerGroup().addTo(map); 
const dangerLayer=L.layerGroup().addTo(map); 
async function chargerPermis(){ 
permisLayer.clearLayers(); 
document.getElementById('listePermis').innerHTML=''; 
let actifs=0,expire=0;const municipalites=new Set();const bounds=[]; 
const r=await fetch('https://permis-brulage.oussama-refas.workers.dev/?t='+Date.now()); 
const permis=await r.json(); 
permis.forEach(p=>{ 
if(!p.latitude||!p.longitude)return; 
let couleur='#5A9E3A'; const h=(new Date(p.Data.EndDate)-new Date())/3600000; 
if(h<=48&&h>0){couleur='#D7A937';expire++;} 
if(h<=0){couleur='#C0392B';}else{actifs++;} 
const lat=parseFloat(p.latitude),lon=parseFloat(p.longitude); 
bounds.push([lat,lon]); 
const m=L.circleMarker([lat,lon],{radius:10,color:'#fff',weight:3,fillColor:couleur,fillOpacity:1}).addTo(permisLayer); 
m.bindPopup('<b>Permis #'+p.RecordID+'</b><br>'+p.adresseComplete+'<br>Expiration : '+p.Data.EndDate); 
const item=document.createElement('div'); item.className='permis-item'; item.innerHTML='<b>#'+p.RecordID+'</b><br>'+p.adresseComplete; item.onclick=()=>{map.setView([lat,lon],15);m.openPopup();}; document.getElementById('listePermis').appendChild(item); 
const ville=p.adresseComplete?.split(',')[1]?.trim(); if(ville) municipalites.add(ville); 
}); 
document.getElementById('actifs').innerText=actifs; 
document.getElementById('expire').innerText=expire; 
document.getElementById('municipalites').innerText=municipalites.size; 
if(bounds.length) map.fitBounds(bounds); 
} 
async function chargerSopfeu(){ 
const r=await fetch('https://quiet-darkness-3c04sopfeu-danger.oussama-refas.workers.dev/?t='+Date.now()); 
const d=await r.json(); 
document.getElementById('dangerGlobal').innerText=d.mataneChicsChocs.niveau; 
document.getElementById('zonesDanger').innerHTML='<div class="layer">'+d.rimouskiMatapedia.nom+' : '+d.rimouskiMatapedia.niveau+'</div><div class="layer">'+d.mataneChicsChocs.nom+' : '+d.mataneChicsChocs.niveau+'</div>'; 
} 
chargerPermis(); chargerSopfeu(); 
setInterval(chargerPermis,60000); setInterval(chargerSopfeu,60000); 
</script> 
</body></html>
