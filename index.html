Index HTML - Carte des permis de brûlage 

<!DOCTYPE html> 
<html lang="fr"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Carte des permis de brûlage - MRC de La Matanie</title> 
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> 
<style> 
:root{--bleu:#003E6B;--vert:#5A9E3A;--jaune:#D7A937;--rouge:#C0392B;--gris:#F5F7FA;} 
html,body{margin:0;padding:0;height:100%;font-family:Segoe UI,Arial,sans-serif;background:var(--gris);} 
.header{background:var(--bleu);color:white;padding:20px 30px;} 
#map{height:70vh;margin:20px;border-radius:18px;overflow:hidden;} 
</style> 
</head> 
<body> 
<div class="header"> 
<h1>Carte des permis de brûlage</h1> 
<p>MRC de La Matanie - Mise à jour en temps réel</p> 
</div> 
<div id="map"></div> 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
<script> 
const map=L.map('map').setView([48.85,-67.53],9); 
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map); 
fetch('https://permis-brulage.oussama-refas.workers.dev') 
.then(r=>r.json()) 
.then(permis=>{ 
let points=[]; 
permis.forEach(p=>{ 
   if(!p.latitude||!p.longitude)return; 
   points.push([parseFloat(p.latitude),parseFloat(p.longitude)]); 
   L.circleMarker([parseFloat(p.latitude),parseFloat(p.longitude)],{radius:8,color:'green',fillColor:'green',fillOpacity:0.8}) 
   .addTo(map) 
   .bindPopup('<b>Permis #'+p.RecordID+'</b><br>'+p.adresseComplete); 
}); 
if(points.length>0){map.fitBounds(points);} 
}); 
</script> 
</body> 
</html>
