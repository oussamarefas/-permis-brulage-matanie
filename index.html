<!DOCTYPE html> 
<html lang="fr"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Portail Prévention Incendie - MRC de La Matanie</title> 
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /> 
<style> 
:root{--bleu:#003E6B;--bleu2:#005A93;--gris:#F4F6F8;} 
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--gris)} 
.header{background:linear-gradient(135deg,var(--bleu),var(--bleu2));color:white;text-align:center;padding:40px} 
.logo{max-height:140px} 
.stats{display:flex;gap:15px;padding:20px;flex-wrap:wrap} 
.card{background:white;border-radius:16px;padding:20px;flex:1;min-width:180px;box-shadow:0 4px 12px rgba(0,0,0,.08)} 
#dangerCard{color:white} 
.layout{display:flex;gap:20px;padding:20px} 
.sidebar{width:340px;background:white;border-radius:16px;padding:15px;box-shadow:0 4px 12px rgba(0,0,0,.08)} 
#map{flex:1;height:75vh;border-radius:16px;overflow:hidden} 
.permis-item{padding:10px;margin-bottom:8px;border-radius:8px;background:#f8fafc;cursor:pointer} 
.danger-zone{padding:12px;border-radius:10px;color:white;margin-bottom:10px;font-weight:bold} 
</style> 
</head> 
<body> 
<div class="header"> 
<img src="Logo-SPI-Transparent.png" class="logo"> 
<h1>Portail Prévention Incendie</h1> 
<p>MRC de La Matanie</p> 
</div> 
<div class="stats"> 
<div class="card"><h2 id="actifs">0</h2><p>Permis actifs</p></div> 
<div class="card"><h2 id="expire">0</h2><p>Expire bientôt</p></div> 
<div class="card"><h2 id="municipalites">0</h2><p>Municipalités concernées</p></div> 
<div class="card" id="dangerCard"><h2 id="dangerGlobal">--</h2><p>Danger SOPFEU</p></div> 
</div> 
<div class="layout"> 
<div class="sidebar"> 
<h3>Zones SOPFEU</h3> 
<div id="zonesDanger"></div> 
<h3>Permis actifs</h3> 
<div id="listePermis"></div> 
</div> 
<div id="map"></div> 
</div> 
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> 
</body> 
</html>
