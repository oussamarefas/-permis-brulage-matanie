<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte des permis de brûlage</title>

    <link relnpkg.com/leaflet/dist/leaflet.css

    <style>
        body {
            margin: 0;
        }

        #carte {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>

<body>

<div id="carte"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.jsipt>

var carte = L.map('carte').setView([48.845, -67.53], 10);

L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
        attribution: '&copy; OpenStreetMap'
    }
).addTo(carte);

L.marker([48.845, -67.53])
    .addTo(carte)
    .bindPopup('Permis de brûlage actif');

</script>

</body>
</html>
